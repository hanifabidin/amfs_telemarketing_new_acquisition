# amfs_tm/configs/matrix_config.yaml

settings:
  # Mode: 'all' (merge + impute), 'merge' (join only), 'impute' (dummify only)
  running_mode: "all"
  
  # Input from the filtering step
  input_file: "04_campaigns/{campaign}/01_filters/filtered_cif_{snapshot}_DIL_{dil}_campaign_{campaign}.csv"
  
  # Intermediate merge output
  merge_output: "04_campaigns/{campaign}/02_matrix/matrix_{snapshot}_merged_raw.csv"
  
  # Final dummified/imputed output
  final_output: "04_campaigns/{campaign}/02_matrix/matrix_{snapshot}_DIL_{dil}_campaign_{campaign}_final.csv"

feature_sets:
  cif_summary:
    enabled: true
    file: "03_features/BM_features/CIFSUMM_{snapshot}_cleaned.csv"
    key: cifno
    usecols: [] # Empty list = take all columns

  bank_ph:
    enabled: true
    file: "03_features/BM_features/PHSUMM_{snapshot}_feat.csv"
    key: cifno
    usecols: []

  saving_acct:
    enabled: true
    file: "03_features/BM_features/Saving_Acct_{snapshot}_feat.csv"
    key: cifno
    usecols: []

  axa_avr:
    enabled: true
    file: "03_features/BM_features/axa_avr_{snapshot}_feat.csv"
    key: cifno
    usecols: []

  cust_demo:
    enabled: true
    file: "03_features/BM_features/axa_cust_demo_clean_{snapshot}.csv"
    key: cusno
    usecols: []

  balance_feat:
    enabled: true
    file: "03_features/BM_features/bal_{snap_short}_feat.csv"
    key: cifno
    usecols: []

  balance_raw:
    enabled: true
    file: "03_features/BM_features/bal_{snap_short}_feat_raw.csv"
    key: cifno
    usecols: []

  balance_deduct:
    enabled: true
    file: "03_features/BM_features/bal_deduct_{snapshot}.csv"
    key: cifno
    usecols: []

  loan_feat:
    enabled: true
    file: "03_features/BM_features/bal_loan_feat_{snap_short}.csv"
    key: cifno
    usecols: ['max_bal_3mth', 'max_bal_6mth', 'min_bal_3mth', 'avg_bal_3mth', 'd20_3mth', 'delta_avg_bal_t1_t2', 'ratio_delta_avg_bal_t1_t2', 'delta_avg_bal_t2_t3', 'ratio_delta_avg_bal_t2_t3', 'delta_avg_bal_t3_t4', 'ratio_delta_avg_bal_t3_t4', 'loan_to_debit']

  cc_counts:
    enabled: true
    file: "03_features/BM_features/cc_type_cnt_{snapshot}_feat.csv"
    key: cifno
    usecols: []

  dc_counts:
    enabled: true
    file: "03_features/BM_features/dc_type_cnt_{snapshot}_feat.csv"
    key: cifno
    usecols: []

  loan_diff:
    enabled: true
    file: "03_features/BM_features/loan_diff_{snapshot}_feat.csv"
    key: cifno
    usecols: []

  trx_net:
    enabled: true
    file: "03_features/BM_features/trxnet_{snapshot}_feat.csv"
    key: cifno
    usecols: []

  trx_net_lag:
    enabled: true
    file: "03_features/BM_features/trxnet_{snapshot}_lag_feat.csv"
    key: cifno
    usecols: []

  trx_out:
    enabled: true
    file: "03_features/BM_features/trxout_{snapshot}_feat.csv"
    key: cifno_pengirim
    usecols: []

  trx_out_lag:
    enabled: true
    file: "03_features/BM_features/trxout_{snapshot}_lag_feat.csv"
    key: cifno_pengirim
    usecols: []

  trx_purchase:
    enabled: true
    file: "03_features/BM_features/trxout_purchase_{snapshot}_feat.csv"
    key: customer_no
    usecols: []

  trx_purchase_lag:
