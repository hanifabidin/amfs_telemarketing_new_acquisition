# amfs_tm/configs/train_config.yaml

settings:
  # 'dummy' for synthetic dev, 'real' for actual model building
  mode: "dummy" 
  dummy_conversion_rate: 0.05

  # Training/Testing snapshot selection
  train_snapshots: ["202501", "202502", "202503", "202504"]
  test_snapshot: "202505"

  # Path to bank campaign results (Campaign month is snapshot + 1)
  call_tracking_file: "01_raw/data_from_BM/{campaign}/call_tracking_{campaign}.txt"

paths:
  # Modelling artifacts moved to 04_modelling
  train_output: "04_modelling/training_data/train_data_{mode}_{snapshot}.csv"
  test_output: "04_modelling/testing_data/test_data_{mode}_{snapshot}.csv"

target_logic:
  target_col: "target"
  called_threshold: 1
  conversion_threshold: 901